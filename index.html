<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>People and People · Week 1 Tools</title>
<style>
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: #FFF8E7;
    color: #333;
    margin: 0;
    padding: 40px 20px;
    text-align: center;
  }
  h1 {
    font-size: 36px;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #888;
    font-size: 16px;
    margin-bottom: 40px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px;
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: #fff;
    border: 2px solid #333;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 4px 4px 0 #333;
  }
  .card .emoji {
    font-size: 40px;
    margin-bottom: 12px;
  }
  .card h2 {
    font-size: 20px;
    margin: 8px 0;
  }
  .card p {
    color: #666;
    font-size: 14px;
    margin: 0;
  }
  .footer {
    margin-top: 60px;
    color: #999;
    font-style: italic;
  }
</style>
</head>
<body>

<h1>💼 People and People</h1>
<p class="subtitle">Claude AI 学习营 Week 1 · 5 个 Python 小工具</p>

<div class="grid">
  <div class="card">
    <div class="emoji">🌡️</div>
    <h2>Temperature Converter</h2>
    <p>摄氏度 / 华氏度互换</p>
  </div>

  <div class="card">
    <div class="emoji">👋</div>
    <h2>Personalized Greetings</h2>
    <p>根据姓名和年龄生成走心问候</p>
  </div>

  <div class="card">
    <div class="emoji">💵</div>
    <h2>Tip Calculator</h2>
    <p>多人小费 & 账单计算</p>
  </div>

  <div class="card">
    <div class="emoji">🔐</div>
    <h2>Password Generator</h2>
    <p>生成安全的随机密码</p>
  </div>

  <div class="card">
    <div class="emoji">⚖️</div>
    <h2>BMI Calculator</h2>
    <p>计算 BMI 并获得健康建议</p>
  </div>
</div>

<p class="footer">Small tools, big convenience.</p>

</body>
</html>
